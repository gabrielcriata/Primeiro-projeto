<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desenho de Área de Matrícula</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .canvas-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen flex flex-col md:flex-row overflow-hidden font-sans">

    <!-- Painel Lateral -->
    <aside class="w-full md:w-1/3 lg:w-1/4 bg-white border-r border-gray-200 flex flex-col h-1/2 md:h-full shadow-lg z-10">
        <div class="p-4 bg-emerald-800 text-white shadow-md">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>
                Matrícula Topo
            </h1>
            <p class="text-sm text-emerald-100 mt-1">Leitura automática de imóveis</p>
        </div>

        <div class="p-4 flex-1 overflow-y-auto">
            <div class="flex flex-col gap-3 mb-6">
                <button onclick="document.getElementById('fileInput').click()" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg shadow hover:bg-indigo-700 transform active:scale-95 transition flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd" /></svg>
                    LER MATRÍCULA (FOTO/PDF)
                </button>
                <input type="file" id="fileInput" accept="image/*,application/pdf" class="hidden" onchange="handleFileUpload(event)">
                
                <div class="flex justify-between items-center px-1">
                    <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider">Vértices do Lote</h2>
                    <button onclick="clearAll()" class="text-xs text-red-500 hover:underline">Limpar tudo</button>
                </div>
            </div>

            <div class="bg-gray-50 border border-gray-200 rounded-lg overflow-hidden">
                <div class="grid grid-cols-12 gap-1 bg-gray-200 p-2 text-[10px] font-bold text-gray-600 text-center uppercase">
                    <div class="col-span-3">Ponto</div>
                    <div class="col-span-4">X (m)</div>
                    <div class="col-span-4">Y (m)</div>
                    <div class="col-span-1"></div>
                </div>
                <div id="pointsList" class="divide-y divide-gray-200"></div>
            </div>

            <button onclick="addPoint()" class="w-full mt-3 py-2 border-2 border-dashed border-gray-300 rounded text-gray-400 hover:text-emerald-600 hover:border-emerald-500 transition text-sm">
                + Adicionar Vértice Manual
            </button>
        </div>
        
        <div class="p-4 bg-gray-50 border-t border-gray-200 text-[10px] text-gray-400 flex justify-between items-center">
            <span>Desenvolvido para análise imobiliária</span>
            <button onclick="resetApiKey()" class="text-indigo-600 hover:text-indigo-800 flex items-center gap-1 font-bold" title="Alterar Chave API">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>
                API
            </button>
        </div>
    </aside>

    <!-- Área de Desenho -->
    <main class="w-full md:w-2/3 lg:w-3/4 h-1/2 md:h-full flex flex-col bg-gray-100 relative">
        <div class="absolute top-4 left-4 right-4 flex flex-wrap gap-4 z-10 pointer-events-none">
            <div class="bg-white/90 backdrop-blur shadow-xl rounded-xl p-4 pointer-events-auto border-l-4 border-emerald-500 min-w-[150px]">
                <p class="text-[10px] text-gray-500 font-bold uppercase">Área Total</p>
                <p class="text-2xl font-black text-gray-800" id="areaResult">0.00 <span class="text-xs font-normal">m²</span></p>
                <p class="text-sm text-emerald-600 font-bold" id="hectareResult">0.0000 ha</p>
            </div>
            <div class="bg-white/90 backdrop-blur shadow-xl rounded-xl p-4 pointer-events-auto border-l-4 border-blue-500 min-w-[150px]">
                <p class="text-[10px] text-gray-500 font-bold uppercase">Perímetro</p>
                <p class="text-2xl font-black text-gray-800" id="perimeterResult">0.00 <span class="text-xs font-normal">m</span></p>
            </div>
        </div>

        <div class="flex-1 w-full h-full p-6 canvas-container" id="canvasParent">
            <canvas id="mapCanvas" class="w-full h-full bg-white rounded-2xl shadow-inner border border-gray-200"></canvas>
            <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 pointer-events-none hidden">
                <p class="text-lg font-medium italic">Aguardando dados ou imagem...</p>
            </div>
        </div>
    </main>

    <!-- Modais de Feedback -->
    <div id="loadingModal" class="fixed inset-0 bg-black/70 hidden flex flex-col items-center justify-center z-[100] p-6 backdrop-blur-md">
        <div class="w-16 h-16 border-4 border-indigo-400 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-xl font-bold text-white mb-2">IA Analisando Documento</h2>
        <p class="text-indigo-200 text-center max-w-sm">Extraindo medidas e calculando coordenadas do lote...</p>
    </div>

    <div id="msgModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center border-t-8 border-indigo-500">
            <h3 id="msgTitle" class="text-xl font-bold mb-2">Aviso</h3>
            <p id="msgBody" class="text-gray-600 mb-6 text-sm"></p>
            <button onclick="closeMsgModal()" class="w-full px-4 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition">ENTENDIDO</button>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO DA CHAVE (SEGURA NO NAVEGADOR) ---
        // A chave foi removida do código para segurança no GitHub.
        
        let points = [
            { id: 1, name: 'P1', x: 0, y: 0 },
            { id: 2, name: 'P2', x: 9.25, y: 0 },
            { id: 3, name: 'P3', x: 9.25, y: 23 },
            { id: 4, name: 'P4', x: 0, y: 23 }
        ];

        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const pointsListEl = document.getElementById('pointsList');

        function init() {
            window.addEventListener('resize', () => { resizeCanvas(); drawMap(); });
            resizeCanvas();
            renderTable();
        }

        function resizeCanvas() {
            const parent = document.getElementById('canvasParent');
            canvas.width = parent.clientWidth - 48;
            canvas.height = parent.clientHeight - 48;
        }

        function renderTable() {
            pointsListEl.innerHTML = '';
            points.forEach((pt) => {
                const row = document.createElement('div');
                row.className = 'grid grid-cols-12 gap-1 p-2 items-center hover:bg-white transition';
                row.innerHTML = `
                    <div class="col-span-3"><input type="text" value="${pt.name}" onchange="updatePoint(${pt.id}, 'name', this.value)" class="w-full p-1 text-xs border rounded bg-transparent"></div>
                    <div class="col-span-4"><input type="number" step="any" value="${pt.x}" oninput="updatePoint(${pt.id}, 'x', this.value)" class="w-full p-1 text-xs border rounded font-mono"></div>
                    <div class="col-span-4"><input type="number" step="any" value="${pt.y}" oninput="updatePoint(${pt.id}, 'y', this.value)" class="w-full p-1 text-xs border rounded font-mono"></div>
                    <div class="col-span-1 text-center"><button onclick="removePoint(${pt.id})" class="text-red-400 font-bold hover:text-red-600">×</button></div>
                `;
                pointsListEl.appendChild(row);
            });
            updateCalculationsAndDraw();
        }

        function updatePoint(id, field, value) {
            const pt = points.find(p => p.id === id);
            if (pt) {
                pt[field] = (field === 'x' || field === 'y') ? (parseFloat(value) || 0) : value;
                updateCalculationsAndDraw();
            }
        }

        // --- INTEGRAÇÃO COM IA E SEGURANÇA DA CHAVE ---
        function getApiKey() {
            let key = localStorage.getItem('gemini_api_key');
            if (!key) {
                key = prompt("Por favor, insira a sua nova Chave de API do Google Gemini:\n\n(A chave ficará guardada em segurança APENAS no seu computador, o código no GitHub continuará limpo e seguro.)");
                if (key && key.trim() !== "") {
                    localStorage.setItem('gemini_api_key', key.trim());
                }
            }
            return key;
        }

        function resetApiKey() {
            localStorage.removeItem('gemini_api_key');
            showMsg('Chave Removida', 'A sua chave de API foi removida da memória deste navegador. Terá de a inserir novamente na próxima análise.');
        }

        async function handleFileUpload(e) {
            const file = e.target.files[0]; if (!file) return;
            
            // Pede a chave antes de começar a carregar
            const apiKey = getApiKey();
            if (!apiKey) {
                showMsg('Erro', 'É obrigatório fornecer uma Chave de API para utilizar a inteligência artificial.');
                e.target.value = '';
                return;
            }

            toggleLoading(true);
            const reader = new FileReader();
            reader.onload = async function() {
                let base64 = "";
                if (file.type === 'application/pdf') {
                    const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                    const page = await pdf.getPage(1);
                    const viewport = page.getViewport({ scale: 2 });
                    const c = document.createElement('canvas');
                    const cctx = c.getContext('2d');
                    c.height = viewport.height; c.width = viewport.width;
                    await page.render({ canvasContext: cctx, viewport }).promise;
                    base64 = c.toDataURL('image/png').split(',')[1];
                } else {
                    base64 = this.result.split(',')[1];
                }
                await callGemini(base64, apiKey);
            };
            file.type === 'application/pdf' ? reader.readAsArrayBuffer(file) : reader.readAsDataURL(file);
            e.target.value = ''; // Limpa o input
        }

        async function callGemini(base64, apiKey) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const prompt = `Analise a matrícula de imóvel na imagem. Identifique as medidas lineares do terreno. 
            Regras de Saída:
            1. Crie coordenadas (X,Y) começando em 0,0. 
            2. Gire em sentido anti-horário.
            3. Se for retângulo (ex: frente 9,25 e lado 23), os pontos são: (0,0), (9.25,0), (9.25,23), (0,23).
            4. Retorne APENAS um JSON: {"vertices": [{"name": "P1", "x": 0, "y": 0}, ...], "resumo": "Explicação breve"}`;

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64 } }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(errorData.error?.message || "Erro na conexão com o Google");
                }

                const data = await res.json();
                const json = JSON.parse(data.candidates[0].content.parts[0].text);
                
                if (json.vertices) {
                    points = json.vertices.map((v, i) => ({ id: Date.now()+i, name: v.name, x: Number(v.x), y: Number(v.y) }));
                    renderTable();
                    showMsg('Sucesso', json.resumo || 'Terreno identificado com sucesso!');
                }
            } catch (err) {
                console.error(err);
                showMsg('Erro', 'A IA não conseguiu ler este documento. Erro: ' + err.message);
            } finally { toggleLoading(false); }
        }

        function toggleLoading(s) { document.getElementById('loadingModal').classList[s?'remove':'add']('hidden'); }
        function showMsg(t, b) { document.getElementById('msgTitle').innerText = t; document.getElementById('msgBody').innerText = b; document.getElementById('msgModal').classList.remove('hidden'); }
        function closeMsgModal() { document.getElementById('msgModal').classList.add('hidden'); }

        window.onload = init;
    </script>
</body>
</html>

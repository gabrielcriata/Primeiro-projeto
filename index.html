<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão RH 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="impressao.css" media="print">
</head>
<body>
    <div id="toast-container"></div>

    <aside class="sidebar">
        <div class="logo"><h2>✨ Meu RH</h2></div>
        <nav class="menu">
            <button class="menu-item ativo" onclick="mudarAba(event, 'tela-dashboard')">📊 Dashboard</button>
            <button class="menu-item" onclick="mudarAba(event, 'tela-admissao')">📝 Nova Admissão</button>
            <button class="menu-item" onclick="mudarAba(event, 'tela-equipe')">👥 Equipe Geral</button>
            <button class="menu-item" onclick="mudarAba(event, 'tela-ferias')" style="color: #008A8F;">🏖️ Gestão de Férias</button>
        </nav>
    </aside>

    <main class="main-content">
        <!-- DASHBOARD -->
        <section id="tela-dashboard" class="aba ativa">
            <div class="header-tela">
                <h1>Painel de Controle</h1>
                <p>Gestão local e segura de dados</p>
            </div>
            <div class="dashboard-grid">
                <div class="coluna-cards">
                    <div class="card card-destaque">
                        <h3>Total de Funcionários</h3>
                        <div class="numero-circulo circulo-roxo" id="contador-funcionarios">0</div>
                    </div>
                    <div class="card">
                        <h3>📥 Importar do Excel (CSV)</h3>
                        <label class="btn-acao" style="background-color: #00C4CC; color: white; width: 100%; text-align: center; cursor: pointer; display: block;">
                            📁 Selecionar CSV
                            <input type="file" id="importarExcel" accept=".csv" style="display: none;" onchange="importarPlanilhaCSV(event)">
                        </label>
                    </div>
                    <div class="card">
                        <h3>💾 Backup</h3>
                        <button class="btn-acao" onclick="exportarBackup()" style="background-color: #8B3DFF; color: white; width: 100%;">📤 Exportar JSON</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- ADMISSÃO -->
        <section id="tela-admissao" class="aba">
            <div class="container">
                <h1>Cadastro</h1>
                <form id="formFuncionario">
                    <div class="form-group full-width"><label>Nome</label><input type="text" id="nome" required></div>
                    <div class="form-group"><label>CPF</label><input type="text" id="cpf" required></div>
                    <div class="form-group"><label>Admissão</label><input type="date" id="dataAdmissao" required></div>
                    <button type="submit" class="btn-cadastrar">✨ Salvar</button>
                </form>
            </div>
        </section>

        <!-- FÉRIAS -->
        <section id="tela-ferias" class="aba">
            <div class="table-container">
                <h2>🏖️ Gestão de Férias</h2>
                <table id="tabelaFerias">
                    <thead><tr><th>Status</th><th>Nome</th><th>Saldo</th><th>Ação</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <!-- MODAL COM CORREÇÃO DE FECHAMENTO -->
            <div id="modal-ferias" onclick="if(event.target == this) fecharModalFerias()" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; cursor: pointer;">
                <div class="card" style="width: 90%; max-width: 400px; cursor: default;">
                    <h2 id="modal-ferias-nome">Lançar Férias</h2>
                    <input type="hidden" id="modal-ferias-id">
                    <div class="form-group"><label>Saída</label><input type="date" id="modal-saida"></div>
                    <div class="form-group"><label>Retorno</label><input type="date" id="modal-retorno" onchange="calcularDiasModal()"></div>
                    <div class="form-group"><label>Dias</label><input type="number" id="modal-dias" disabled></div>
                    <button class="btn-cadastrar" style="width: 100%;" onclick="salvarAgendamentoFerias()">💾 Confirmar</button>
                </div>
            </div>
        </section>

        <!-- EQUIPE -->
        <section id="tela-equipe" class="aba">
            <div class="table-container">
                <h2>Lista de Equipe</h2>
                <table id="tabelaFuncionarios">
                    <thead><tr><th>Nome</th><th>Cargo</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="utils.js"></script>
    <script src="storage.js"></script>
    <script src="ferias.js"></script>
    <script src="admissao.js"></script>
</body>
</html>
